services:
  db:
    image: postgres:13
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  books_service:
    build:
      context: ./books_service
    env_file:
      - .env
    networks:
      - app_net
      - db_net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  users_service:
    build:
      context: ./users_service
    env_file:
      - .env
    networks:
      - app_net
      - db_net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  orders_service:
    build:
      context: ./orders_service
    env_file:
      - .env
    networks:
      - app_net
      - db_net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${NGINX_HOST_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - public_net
      - app_net
    depends_on:
      - books_service
      - users_service
      - orders_service
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:

networks:
  public_net:
    driver: bridge

  app_net:
    driver: bridge
    internal: true

  db_net:
    driver: bridge
    internal: true
